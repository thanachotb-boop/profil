<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>พอร์ตโฟลิโอและโปรไฟล์ระดับพรีเมียม</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & Sarabun -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Sarabun', sans-serif;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0b0f19;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
  </style>
</head>
<body class="min-h-screen bg-[#0b0f19] text-slate-100 font-sans antialiased selection:bg-indigo-500 selection:text-white relative overflow-x-hidden">

  <!-- สัญลักษณ์เรืองแสงพื้นหลัง (Ambient Light Backdrops) -->
  <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-indigo-900/15 rounded-full blur-[120px] pointer-events-none z-0"></div>
  <div class="absolute top-[400px] right-10 w-[600px] h-[600px] bg-purple-900/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

  <!-- Floating Header -->
  <header class="sticky top-0 z-40 backdrop-blur-md bg-[#0b0f19]/70 border-b border-slate-800/60 transition-all">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <span class="h-2.5 w-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
        <span class="font-semibold tracking-wider text-sm text-slate-300 uppercase">Studio Portfolio</span>
      </div>

      <div class="flex items-center space-x-4">
        <!-- Action Buttons -->
        <div id="header-actions">
          <!-- Will render dynamic button by JS -->
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 relative z-10">
    
    <!-- ส่วน Cover และ Profile Card -->
    <div class="relative mb-8 rounded-3xl overflow-hidden bg-slate-900/50 border border-slate-800/80 shadow-2xl">
      <!-- Cover Banner -->
      <div class="h-44 sm:h-64 relative overflow-hidden group">
        <img id="profile-cover" src="" alt="Cover Art" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1200&h=400'">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0b0f19] via-transparent to-transparent opacity-80"></div>
        
        <!-- อัปโหลดรูปหน้าปกแบบด่วน -->
        <label id="upload-cover-btn" class="hidden absolute bottom-4 right-4 flex items-center space-x-2 px-3.5 py-2 rounded-xl bg-black/70 hover:bg-black/90 backdrop-blur-md text-white text-xs font-medium cursor-pointer border border-white/10 transition-all">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" strokeLinejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span>เปลี่ยนรูปปก</span>
          <input type="file" accept="image/*" onchange="handleImageUpload(event, 'cover')" class="hidden" />
        </label>
      </div>

      <!-- Profile Hero Box -->
      <div class="px-6 pb-8 sm:px-10 relative flex flex-col md:flex-row items-center md:items-end -mt-16 md:-mt-20 gap-6">
        
        <!-- Avatar block -->
        <div class="relative group w-32 h-32 sm:w-40 sm:h-40 rounded-2xl overflow-hidden border-4 border-[#0b0f19] bg-slate-950 shadow-2xl flex-shrink-0">
          <img id="profile-avatar" src="" alt="Avatar" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600&h=600'">
          <label id="upload-avatar-btn" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/60 cursor-pointer text-white opacity-100 transition-opacity">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" strokeLinejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            </svg>
            <span class="text-[10px] font-bold">อัปโหลดรูป</span>
            <input type="file" accept="image/*" onchange="handleImageUpload(event, 'avatar')" class="hidden" />
          </label>
        </div>

        <!-- Profile Brief Info -->
        <div class="flex-1 text-center md:text-left mt-2 md:mt-0">
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div id="profile-title-area" class="w-full max-w-lg">
              <!-- Rendered dynamically (Text or Input elements) -->
            </div>

            <!-- Status indicator -->
            <div class="flex justify-center md:justify-end">
              <span class="inline-flex items-center space-x-2 px-3.5 py-1.5 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-semibold border border-emerald-500/25">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                <span>พร้อมรับงาน / พร้อมร่วมงาน</span>
              </span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- main workspace: Switch between Editor and Viewer -->
    <div id="workspace"></div>

  </main>

  <!-- สัญญาณแจ้งเตือนแบบพรีเมียม (Toast Alert) -->
  <div id="toast-container" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none">
    <div class="px-5 py-3 rounded-2xl bg-indigo-600 border border-indigo-500 text-white text-xs font-bold shadow-2xl flex items-center space-x-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span id="toast-text">ข้อความแจ้งเตือน</span>
    </div>
  </div>

  <footer class="mt-20 border-t border-slate-900 py-10 text-center relative z-10">
    <p class="text-xs text-slate-600">© 2026 Creative Premium Portfolio • Designed with elegance</p>
  </footer>

  <script>
    // ข้อมูลจำลองและโครงสร้างข้อมูลตั้งต้น
    const defaultProfile = {
      name: "จิรภัทร เมธาอัครกุล",
      role: "Senior Creative Director & Lead Frontend Architect",
      location: "กรุงเทพมหานคร, ประเทศไทย",
      email: "jirapat.meta@creative-studio.io",
      phone: "+66 82 345 6789",
      website: "https://jirapat.design",
      bio: "นักออกแบบและพัฒนาผู้ผสมผสานเทคโนโลยีสมัยใหม่เข้ากับศิลปะการจัดวางองค์ประกอบดิจิทัล มุ่งสร้างสรรค์เว็บแอปพลิเคชันที่มีเอกลักษณ์เฉพาะตัว สวยงามอย่างไร้รอยต่อ และมุ่งเน้นประสบการณ์ใช้งานระดับไฮเอนด์",
      avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600&h=600",
      cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1200&h=400",
      skills: [
        { name: "React / Next.js", level: 95 },
        { name: "UI/UX & Design Systems", level: 90 },
        { name: "Tailwind CSS & Animations", level: 95 },
        { name: "Three.js / WebGL", level: 75 },
        { name: "Product Strategy", level: 85 }
      ],
      experience: [
        { id: 1, period: "2024 - ปัจจุบัน", position: "Lead Frontend Engineer", company: "Aether Digital Agency", desc: "นำทีมพัฒนาโปรเจกต์เว็บแอปพลิเคชันระดับพรีเมียม และสร้างระบบ Design System ประสิทธิภาพสูงให้กับแบรนด์ชั้นนำ" },
        { id: 2, period: "2021 - 2024", position: "Senior UI Developer", company: "Nova Tech Solutions", desc: "ออกแบบโครงสร้างสถาปัตยกรรม UI บนเฟรมเวิร์ก React และขับเคลื่อนความเร็วของเว็บเพิ่มขึ้นกว่า 40%" }
      ],
      projects: [
        {
          id: 1,
          title: "E-Commerce Luxury Portal",
          category: "Web Application",
          img: "https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&q=80&w=800",
          tags: ["React", "Stripe", "Framer Motion"]
        },
        {
          id: 2,
          title: "Metaspace Design System",
          category: "UI System",
          img: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?auto=format&fit=crop&q=80&w=800",
          tags: ["Tailwind", "Figma", "Storybook"]
        }
      ]
    };

    // สถานะแอปพลิเคชัน (Application State)
    let profile = JSON.parse(localStorage.getItem('premium_profile_v3')) || defaultProfile;
    let draft = JSON.parse(JSON.stringify(profile)); // คัดลอกไว้สำหรับโหมดแก้ไข
    let isEditing = false;
    let activeTab = 'about'; // 'about' | 'projects' | 'experience'

    // ตัวแปรเก็บค่าฟอร์มย่อย (แก้ไข)
    let newSkill = { name: '', level: 80 };
    let newExp = { period: '', position: '', company: '', desc: '' };
    let newProj = { title: '', category: '', tags: '', img: '' };

    // ฟังก์ชันจัดการข้อความแจ้งเตือน (Toast Notification)
    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast-container');
      const text = document.getElementById('toast-text');
      text.innerText = message;
      toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
      toast.classList.add('translate-y-0', 'opacity-100');

      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
        toast.classList.remove('translate-y-0', 'opacity-100');
      }, 3000);
    }

    // สลับโหมดการแก้ไข
    function enterEditMode() {
      draft = JSON.parse(JSON.stringify(profile));
      isEditing = true;
      renderAll();
      showToast('เปิดใช้งานสตูดิโอปรับแต่งโปรไฟล์แล้ว ✨');
    }

    function cancelEdit() {
      isEditing = false;
      renderAll();
    }

    function saveProfile() {
      const nameInput = document.getElementById('edit-name');
      if (nameInput && !nameInput.value.trim()) {
        showToast('กรุณากรอกชื่ออย่างน้อยหนึ่งตัวอักษร');
        return;
      }

      // ดึงข้อมูลจาก UI input ล่าสุดกลับเข้าสู่ร่างก่อนเซฟ
      if (document.getElementById('edit-bio')) draft.bio = document.getElementById('edit-bio').value;
      if (document.getElementById('edit-location')) draft.location = document.getElementById('edit-location').value;
      if (document.getElementById('edit-email')) draft.email = document.getElementById('edit-email').value;
      if (document.getElementById('edit-phone')) draft.phone = document.getElementById('edit-phone').value;
      if (document.getElementById('edit-website')) draft.website = document.getElementById('edit-website').value;

      profile = JSON.parse(JSON.stringify(draft));
      localStorage.setItem('premium_profile_v3', JSON.stringify(profile));
      isEditing = false;
      renderAll();
      showToast('บันทึกการอัปเดตเรียบร้อยแล้ว ✨');
    }

    // จัดการอัปโหลดไฟล์รูปภาพ (Cover / Avatar)
    function handleImageUpload(e, field) {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 3 * 1024 * 1024) {
          showToast('กรุณาเลือกไฟล์ภาพขนาดไม่เกิน 3MB');
          return;
        }
        const reader = new FileReader();
        reader.onloadend = () => {
          draft[field] = reader.result;
          // อัปเดตรูปที่แสดงทันทีแบบ Realtime
          document.getElementById(`profile-${field}`).src = reader.result;
          showToast(`อัปเดตตัวอย่างรูป ${field === 'avatar' ? 'โปรไฟล์' : 'หน้าปก'} สำเร็จ`);
        };
        reader.readAsDataURL(file);
      }
    }

    // ฟังก์ชันย่อยสำหรับจัดการสกิล
    function addSkill() {
      const skillNameInput = document.getElementById('new-skill-name');
      const skillLevelInput = document.getElementById('new-skill-level');
      if (skillNameInput && skillNameInput.value.trim()) {
        draft.skills.push({
          name: skillNameInput.value.trim(),
          level: Number(skillLevelInput.value)
        });
        renderAll();
        showToast('เพิ่มทักษะใหม่แล้ว');
      } else {
        showToast('กรุณากรอกชื่อทักษะ');
      }
    }

    function removeSkill(idx) {
      draft.skills.splice(idx, 1);
      renderAll();
    }

    // ฟังก์ชันย่อยสำหรับประสบการณ์
    function addExperience() {
      const period = document.getElementById('new-exp-period').value.trim();
      const position = document.getElementById('new-exp-position').value.trim();
      const company = document.getElementById('new-exp-company').value.trim();
      const desc = document.getElementById('new-exp-desc').value.trim();

      if (period && position && company) {
        draft.experience.unshift({ id: Date.now(), period, position, company, desc });
        renderAll();
        showToast('เพิ่มประวัติการทำงานเรียบร้อย');
      } else {
        showToast('กรุณากรอกข้อมูลปี ตำแหน่ง และบริษัทให้ครบถ้วน');
      }
    }

    function removeExperience(id) {
      draft.experience = draft.experience.filter(item => item.id !== id);
      renderAll();
    }

    // ฟังก์ชันย่อยสำหรับจัดการผลงาน
    function addProject() {
      const title = document.getElementById('new-proj-title').value.trim();
      const category = document.getElementById('new-proj-category').value.trim();
      const tagsRaw = document.getElementById('new-proj-tags').value.trim();
      const img = document.getElementById('new-proj-img').value.trim();

      if (title && category) {
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()) : [];
        const imageSrc = img || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800";
        draft.projects.unshift({ id: Date.now(), title, category, tags, img: imageSrc });
        renderAll();
        showToast('เพิ่มผลงานชิ้นใหม่เรียบร้อย');
      } else {
        showToast('กรุณาระบุชื่อผลงานและประเภทงาน');
      }
    }

    function removeProject(id) {
      draft.projects = draft.projects.filter(item => item.id !== id);
      renderAll();
    }

    // สลับแท็บข้อมูล
    function setTab(tabId) {
      activeTab = tabId;
      renderAll();
    }

    // ฟังก์ชันสำหรับเรนเดอร์โครงสร้างหน้าจอหลักทั้งหมด (Render engine)
    function renderAll() {
      const activeData = isEditing ? draft : profile;

      // 1. อัปเดตรูปภาพ
      document.getElementById('profile-cover').src = activeData.cover;
      document.getElementById('profile-avatar').src = activeData.avatar;

      // 2. จัดการการมองเห็นของปุ่มอัปโหลดรูป
      if (isEditing) {
        document.getElementById('upload-cover-btn').classList.remove('hidden');
        document.getElementById('upload-avatar-btn').classList.remove('hidden');
      } else {
        document.getElementById('upload-cover-btn').classList.add('hidden');
        document.getElementById('upload-avatar-btn').classList.add('hidden');
      }

      // 3. ปรับเปลี่ยนข้อมูลในส่วน Header Actions (ปุ่มเปิดปิดโหมดแก้)
      const headerActions = document.getElementById('header-actions');
      if (!isEditing) {
        headerActions.innerHTML = `
          <button onclick="enterEditMode()" class="flex items-center space-x-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white text-xs font-bold tracking-wide shadow-lg shadow-indigo-950/40 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
            <span>สตูดิโอปรับแต่งโปรไฟล์</span>
          </button>
        `;
      } else {
        headerActions.innerHTML = `
          <div class="flex items-center space-x-2">
            <button onclick="cancelEdit()" class="px-4 py-2 rounded-full border border-slate-700 hover:border-slate-500 text-slate-300 text-xs font-semibold transition-all">
              ยกเลิก
            </button>
            <button onclick="saveProfile()" class="px-5 py-2 rounded-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold tracking-wide transition-all shadow-lg shadow-emerald-950/40">
              บันทึกข้อมูล
            </button>
          </div>
        `;
      }

      // 4. แสดงผลส่วน Profile Title (เปลี่ยนเป็น Input หรือ Text)
      const titleArea = document.getElementById('profile-title-area');
      if (isEditing) {
        titleArea.innerHTML = `
          <input id="edit-name" type="text" class="bg-slate-800 text-2xl sm:text-3xl font-extrabold w-full px-3 py-1.5 rounded-xl border border-indigo-500/50 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-white" value="${draft.name}" placeholder="ชื่อ-นามสกุลของคุณ" oninput="draft.name = this.value">
          <input id="edit-role" type="text" class="bg-slate-800 text-sm font-medium w-full mt-2 px-3 py-1.5 rounded-lg border border-slate-700 text-indigo-300 focus:outline-none" value="${draft.role}" placeholder="ตำแหน่ง / ความเชี่ยวชาญ" oninput="draft.role = this.value">
        `;
      } else {
        titleArea.innerHTML = `
          <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-white mb-1">${profile.name}</h2>
          <p class="text-sm sm:text-base font-semibold tracking-wide text-indigo-400">${profile.role}</p>
        `;
      }

      // 5. แสดงผลพื้นที่หลัก (Workspace)
      const workspace = document.getElementById('workspace');
      if (isEditing) {
        renderEditorWorkspace(workspace);
      } else {
        renderViewerWorkspace(workspace);
      }
    }

    // เรนเดอร์โหมดแก้ไข (Studio Editor Mode UI)
    function renderEditorWorkspace(container) {
      // สร้าง UI กล่องกรอกข้อมูล ทักษะ ประวัติการทำงาน และผลงานเด่น
      container.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          
          <!-- ฝั่งซ้าย: ข้อมูลทั่วไป & ประวัติ / ผลงาน -->
          <div class="lg:col-span-2 space-y-6">
            
            <!-- ส่วนที่ 1: แนะนำตัวสั้น & Contact -->
            <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-2xl p-6 space-y-4 shadow-xl">
              <div class="flex items-center space-x-2 text-indigo-400 pb-2 border-b border-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                <h3 class="font-bold text-sm uppercase tracking-wider text-slate-200">แก้ไขข้อมูลประวัติโดยย่อ</h3>
              </div>
              
              <div class="space-y-4">
                <div>
                  <label class="block text-xs font-semibold text-slate-400 mb-1">แนะนำตัวแบบเจาะลึก (Bio)</label>
                  <textarea id="edit-bio" rows="4" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 text-slate-300 resize-none">${draft.bio}</textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">พื้นที่พำนัก (Location)</label>
                    <input id="edit-location" type="text" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-300" value="${draft.location}">
                  </div>
                  <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">อีเมลผู้ติดต่อ (Email)</label>
                    <input id="edit-email" type="email" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-300" value="${draft.email}">
                  </div>
                  <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">เบอร์โทรศัพท์ (Phone)</label>
                    <input id="edit-phone" type="text" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-300" value="${draft.phone}">
                  </div>
                  <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">ลิงก์เว็บไซต์หรือโปรไฟล์</label>
                    <input id="edit-website" type="url" class="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500 text-slate-300" value="${draft.website}">
                  </div>
                </div>
              </div>
            </div>

            <!-- ส่วนที่ 2: แก้ไขผลงานเด่น -->
            <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-2xl p-6 space-y-4 shadow-xl">
              <div class="flex items-center space-x-2 text-indigo-400 pb-2 border-b border-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                <h3 class="font-bold text-sm uppercase tracking-wider text-slate-200">แก้ไขผลงานเด่น (Featured Projects)</h3>
              </div>

              <!-- ฟอร์มสร้างผลงานใหม่ -->
              <div class="p-4 rounded-xl border border-dashed border-slate-700 bg-slate-950/40 space-y-3">
                <span class="text-[10px] font-bold text-indigo-400 tracking-wider uppercase">สร้างกล่องผลงานใหม่</span>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <input id="new-proj-title" type="text" placeholder="ชื่อผลงาน เช่น Luxury App" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                  <input id="new-proj-category" type="text" placeholder="หมวดหมู่ เช่น Web Design" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <input id="new-proj-tags" type="text" placeholder="แท็ก เช่น React, Figma (คั่นด้วยจุลภาค ',')" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                  <input id="new-proj-img" type="text" placeholder="ลิงก์รูปภาพผลงาน (Unsplash หรือ URL)" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                </div>
                <button type="button" onclick="addProject()" class="w-full py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs transition-all">
                  + เพิ่มผลงานลงในแกลเลอรี
                </button>
              </div>

              <!-- รายการผลงานที่มีอยู่ -->
              <div id="editor-projects-list" class="space-y-3">
                ${draft.projects.map((proj) => `
                  <div class="flex items-center justify-between p-3 rounded-xl border border-slate-800 bg-slate-950/60">
                    <div class="flex items-center space-x-3">
                      <img src="${proj.img}" alt="${proj.title}" class="w-12 h-12 rounded-lg object-cover" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800'">
                      <div>
                        <h4 class="text-xs font-bold text-white">${proj.title}</h4>
                        <span class="text-[10px] text-slate-500">${proj.category}</span>
                      </div>
                    </div>
                    <button type="button" onclick="removeProject(${proj.id})" class="text-slate-400 hover:text-rose-500 p-2">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- ส่วนที่ 3: แก้ไข Timeline ประสบการณ์ -->
            <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-2xl p-6 space-y-4 shadow-xl">
              <div class="flex items-center space-x-2 text-indigo-400 pb-2 border-b border-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                <h3 class="font-bold text-sm uppercase tracking-wider text-slate-200">แก้ไขเส้นประวัติทำงาน & ศึกษา</h3>
              </div>

              <!-- ฟอร์มสร้างเส้นใหม่ -->
              <div class="p-4 rounded-xl border border-dashed border-slate-700 bg-slate-950/40 space-y-3">
                <span class="text-[10px] font-bold text-indigo-400 tracking-wider uppercase">เพิ่มเส้นความทรงจำใหม่</span>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                  <input id="new-exp-period" type="text" placeholder="ปี เช่น 2022 - 2024" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                  <input id="new-exp-position" type="text" placeholder="ตำแหน่ง / วุฒิ" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                  <input id="new-exp-company" type="text" placeholder="บริษัท / สถาบัน" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                </div>
                <textarea id="new-exp-desc" placeholder="รายละเอียดผลงานหรือวิชาเรียนสั้น ๆ..." rows="2" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none resize-none"></textarea>
                <button type="button" onclick="addExperience()" class="w-full py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs transition-all">
                  + เพิ่มเข้าเส้นประวัติ
                </button>
              </div>

              <div id="editor-experience-list" class="space-y-3">
                ${draft.experience.map((item) => `
                  <div class="flex items-center justify-between p-3.5 rounded-xl border border-slate-800 bg-slate-950/60">
                    <div>
                      <div class="flex items-center space-x-2">
                        <span class="text-xs font-bold text-indigo-400">${item.period}</span>
                        <span class="text-xs font-medium text-slate-300">| ${item.position}</span>
                      </div>
                      <p class="text-xs text-slate-500 mt-1">${item.company}</p>
                    </div>
                    <button type="button" onclick="removeExperience(${item.id})" class="text-slate-400 hover:text-rose-500 p-2">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                  </div>
                `).join('')}
              </div>
            </div>

          </div>

          <!-- ฝั่งขวา: ทักษะความสามารถ (Skills Panel) -->
          <div class="space-y-6">
            <div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-2xl p-6 space-y-4 shadow-xl">
              <div class="flex items-center space-x-2 text-indigo-400 pb-2 border-b border-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                <h3 class="font-bold text-sm uppercase tracking-wider text-slate-200">ทักษะ & ความเชี่ยวชาญ</h3>
              </div>

              <!-- เพิ่มสกิล -->
              <div class="p-3.5 rounded-xl bg-slate-950/50 border border-slate-800 space-y-3">
                <input id="new-skill-name" type="text" placeholder="เช่น React, Figma, UX Research" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                <div>
                  <label class="block text-[10px] text-slate-500 mb-1">ความชำนาญ (ลากสไลด์เกรด)</label>
                  <input id="new-skill-level" type="range" min="10" max="100" step="5" value="80" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                </div>
                <button type="button" onclick="addSkill()" class="w-full py-1.5 rounded-lg bg-indigo-600/30 hover:bg-indigo-600/50 border border-indigo-500/30 text-indigo-300 font-bold text-xs transition-all">
                  + เพิ่มทักษะนี้
                </button>
              </div>

              <div id="editor-skills-list" class="space-y-2.5">
                ${draft.skills.map((skill, index) => `
                  <div class="flex items-center justify-between p-2.5 rounded-lg bg-slate-950/40 border border-slate-800/80">
                    <div class="flex-1 mr-3">
                      <div class="flex justify-between text-xs font-semibold text-slate-300 mb-1">
                        <span>${skill.name}</span>
                        <span class="text-indigo-400">${skill.level}%</span>
                      </div>
                      <div class="w-full h-1 bg-slate-850 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 rounded-full" style="width: ${skill.level}%"></div>
                      </div>
                    </div>
                    <button type="button" onclick="removeSkill(${index})" class="text-slate-400 hover:text-rose-500">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

        </div>
      `;
    }

    // เรนเดอร์โหมดผู้เยี่ยมชม (Viewer Mode UI with Tab Navigation)
    function renderViewerWorkspace(container) {
      container.innerHTML = `
        <div class="space-y-8">
          
          <!-- แผงประวัติย่อแบบด่วน (Quick Contact Grid) -->
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            ${[
              { label: "Location", val: profile.location, icon: "M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" },
              { label: "Email", val: profile.email, icon: "M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" },
              { label: "Phone", val: profile.phone, icon: "M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" },
              { label: "Website", val: profile.website, icon: "M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" }
            ].map((item) => `
              <div class="bg-slate-900/40 backdrop-blur-md border border-slate-800/80 p-4 rounded-2xl flex items-center space-x-3.5 transition-all hover:border-slate-700/80">
                <div class="p-2.5 rounded-xl bg-indigo-500/10 text-indigo-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${item.icon}" />
                  </svg>
                </div>
                <div class="overflow-hidden">
                  <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">${item.label}</span>
                  <p class="text-xs font-semibold text-slate-200 truncate">${item.val || "ไม่ได้ระบุ"}</p>
                </div>
              </div>
            `).join('')}
          </div>

          <!-- แผงสลับแท็บเมนู -->
          <div class="flex border-b border-slate-800 max-w-lg">
            <button onclick="setTab('about')" class="flex-1 pb-4 text-sm font-semibold relative transition-all ${activeTab === 'about' ? 'text-indigo-400' : 'text-slate-400 hover:text-slate-300'}">
              <span>ประวัติส่วนตัว</span>
              ${activeTab === 'about' ? '<span class="absolute bottom-0 left-0 w-full h-0.5 bg-indigo-500 rounded-full"></span>' : ''}
            </button>
            <button onclick="setTab('projects')" class="flex-1 pb-4 text-sm font-semibold relative transition-all ${activeTab === 'projects' ? 'text-indigo-400' : 'text-slate-400 hover:text-slate-300'}">
              <span>แกลเลอรีผลงาน</span>
              <span class="ml-1.5 px-1.5 py-0.5 rounded-full bg-slate-800 text-[10px] text-slate-400">${profile.projects.length}</span>
              ${activeTab === 'projects' ? '<span class="absolute bottom-0 left-0 w-full h-0.5 bg-indigo-500 rounded-full"></span>' : ''}
            </button>
            <button onclick="setTab('experience')" class="flex-1 pb-4 text-sm font-semibold relative transition-all ${activeTab === 'experience' ? 'text-indigo-400' : 'text-slate-400 hover:text-slate-300'}">
              <span>ไทม์ไลน์ประสบการณ์</span>
              <span class="ml-1.5 px-1.5 py-0.5 rounded-full bg-slate-800 text-[10px] text-slate-400">${profile.experience.length}</span>
              ${activeTab === 'experience' ? '<span class="absolute bottom-0 left-0 w-full h-0.5 bg-indigo-500 rounded-full"></span>' : ''}
            </button>
          </div>

          <!-- พื้นที่แสดงเนื้อหาของแต่ละแท็บ -->
          <div class="mt-4">
            ${renderActiveTabContent()}
          </div>

        </div>
      `;
    }

    // คืนค่าเนื้อหาของแท็บที่กำลังเปิดอยู่
    function renderActiveTabContent() {
      if (activeTab === 'about') {
        return `
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- ข้อมูลแนะนำตัวย่อ -->
            <div class="lg:col-span-2 bg-slate-900/30 backdrop-blur-md border border-slate-800/60 p-6 sm:p-8 rounded-3xl space-y-6">
              <h3 class="text-xl font-bold text-white flex items-center space-x-2.5">
                <span class="w-1.5 h-6 bg-indigo-500 rounded-full"></span>
                <span>เกี่ยวกับตนเอง</span>
              </h3>
              <p class="text-slate-300 text-sm sm:text-base leading-relaxed whitespace-pre-line">${profile.bio}</p>
            </div>

            <!-- กล่องทักษะ -->
            <div class="bg-slate-900/30 backdrop-blur-md border border-slate-800/60 p-6 sm:p-8 rounded-3xl space-y-6">
              <h3 class="text-xl font-bold text-white flex items-center space-x-2.5">
                <span class="w-1.5 h-6 bg-purple-500 rounded-full"></span>
                <span>ทักษะที่เชี่ยวชาญ</span>
              </h3>
              <div class="space-y-4">
                ${profile.skills.map((skill) => `
                  <div class="group">
                    <div class="flex justify-between text-xs font-bold text-slate-300 mb-1.5">
                      <span>${skill.name}</span>
                      <span class="text-indigo-400 transition-transform">${skill.level}%</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-950/80 rounded-full overflow-hidden">
                      <div class="h-full bg-gradient-to-r from-indigo-500 to-violet-500 rounded-full" style="width: ${skill.level}%"></div>
                    </div>
                  </div>
                `).join('')}
                ${profile.skills.length === 0 ? '<p class="text-xs text-slate-500 italic">ยังไม่มีข้อมูลทักษะ</p>' : ''}
              </div>
            </div>
          </div>
        `;
      }

      if (activeTab === 'projects') {
        return `
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            ${profile.projects.map((proj) => `
              <div class="group bg-slate-900/30 backdrop-blur-md border border-slate-800/60 rounded-3xl overflow-hidden hover:border-indigo-500/40 transition-all duration-300 flex flex-col">
                <div class="h-56 relative overflow-hidden">
                  <img src="${proj.img}" alt="${proj.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800'">
                  <div class="absolute top-4 left-4">
                    <span class="px-3 py-1 rounded-full bg-black/60 backdrop-blur-md text-slate-200 text-[10px] font-bold uppercase tracking-wider">${proj.category}</span>
                  </div>
                </div>
                <div class="p-6 flex-1 flex flex-col justify-between">
                  <h4 class="text-lg font-bold text-white group-hover:text-indigo-400 transition-colors">${proj.title}</h4>
                  <div class="flex flex-wrap gap-1.5 mt-4">
                    ${proj.tags.map(tag => `
                      <span class="px-2.5 py-1 rounded-lg bg-indigo-950/40 text-indigo-300 border border-indigo-500/10 text-xs font-semibold">${tag}</span>
                    `).join('')}
                  </div>
                </div>
              </div>
            `).join('')}
            ${profile.projects.length === 0 ? `
              <div class="col-span-2 text-center py-16 bg-slate-900/10 rounded-3xl border border-dashed border-slate-800">
                <p class="text-slate-500 text-sm">ยังไม่มีการเพิ่มผลงานเด่น</p>
              </div>
            ` : ''}
          </div>
        `;
      }

      if (activeTab === 'experience') {
        return `
          <div class="bg-slate-900/30 backdrop-blur-md border border-slate-800/60 p-6 sm:p-8 rounded-3xl">
            <div class="relative border-l-2 border-slate-800 ml-4 sm:ml-8 pl-6 sm:pl-10 space-y-8 py-4">
              ${profile.experience.map((item) => `
                <div class="relative group">
                  <span class="absolute -left-[31px] sm:-left-[47px] top-1 w-4 h-4 rounded-full border-4 border-[#0b0f19] bg-indigo-500 group-hover:scale-125 transition-transform"></span>
                  <div class="space-y-1">
                    <span class="inline-block px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 text-xs font-bold mb-1">${item.period}</span>
                    <h4 class="text-base sm:text-lg font-bold text-white">${item.position}</h4>
                    <span class="text-sm font-semibold text-slate-400">${item.company}</span>
                    ${item.desc ? `<p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed pt-2 max-w-3xl">${item.desc}</p>` : ''}
                  </div>
                </div>
              `).join('')}
              ${profile.experience.length === 0 ? '<p class="text-sm text-slate-500 italic py-4">ยังไม่มีข้อมูลไทม์ไลน์ในขณะนี้</p>' : ''}
            </div>
          </div>
        `;
      }
      return '';
    }

    // เริ่มต้นแสดงผลหน้าแรก
    renderAll();
  </script>
</body>
</html>
